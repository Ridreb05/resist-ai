version: '3.9'

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: resistai
      POSTGRES_PASSWORD: resistai_secret
      POSTGRES_DB: resistai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resistai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Backend ───────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_NAME: ResistAI
      ENVIRONMENT: production
      DATABASE_URL: postgresql+asyncpg://resistai:resistai_secret@db:5432/resistai
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-CHANGE_THIS_IN_PRODUCTION_32_CHAR_MIN}
      ALLOWED_ORIGINS: '["http://localhost","http://localhost:80","http://frontend"]'
      MODEL_DIR: /app/ml_models
    volumes:
      - ml_models:/app/ml_models
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    ports:
      - "8000:8000"   # expose for direct API access / development

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"

volumes:
  postgres_data:
  redis_data:
  ml_models:
