# render.yaml — Declarative Render deployment config
# Place this file in the ROOT of your repo (next to backend/ and frontend/)
# Render will auto-detect it and configure both services.

services:
  # ── Backend API ─────────────────────────────────────────────────────────────
  - type: web
    name: resistai-backend
    runtime: python
    rootDir: backend
    pythonVersion: "3.11.9"          # ← CRITICAL: pins Python, avoids 3.14 issue
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn src.main:app --host 0.0.0.0 --port $PORT"
    plan: free
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SECRET_KEY
        generateValue: true           # Render auto-generates a secure random value
      - key: DATABASE_URL
        fromDatabase:
          name: resistai-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: '["https://resistai-frontend.onrender.com"]'
      - key: MODEL_DIR
        value: /opt/render/project/src/ml_models

  # ── Frontend Static Site ─────────────────────────────────────────────────────
  - type: web
    name: resistai-frontend
    runtime: static
    rootDir: frontend
    buildCommand: "npm install --legacy-peer-deps && npm run build"
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        value: https://resistai-backend.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html     # SPA routing

# ── PostgreSQL Database ───────────────────────────────────────────────────────
databases:
  - name: resistai-db
    plan: free                        # Free tier: 90-day expiry
    databaseName: resistai
    user: resistai
